<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Two TCG | Store</title>
    <link rel="stylesheet" href="/assets/css/base.css">
    <link rel="stylesheet" href="/assets/css/store.css">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <div class="container">
            <nav class="template">

            </nav>
        </div>
    </header>

    <main class="container">
        <div class="container">
            <div class="product-page">
                
                <div class="product-page_media">
                    <img src="" alt="" id="image">
                </div>

                <div class="product-page_info">
                    <h1 id="productName"></h1>
                    <div id="productPrice"></div>
                    <div id="stockCount"></div>
                
                    <div id="qtyControls">
                        <div class="qty-group">
                            <button id="decBtn" type="button">-</button>
                            <input type="number" id="numInput" value="1" size="2"/>
                            <button id="incBtn" type="button">+</button>
                        </div>
                        <button id="cartBtn">Add to Basket</button>
                        <button id="removeBtn" type="button">Remove</button>
                    </div>

                    <div id="inCart"></div>
                </div>
            </div>

            <div class="product-description">
                <p id="description"></p>
            </div>

        </div>
    </main>

    <footer>
        <div class="container footer">
            
        </div>
    </footer>

    <script type="module" src="/assets/js/product.js"></script>
    <script type="module" src="/assets/js/app.js"></script>
    
</body>

</html>

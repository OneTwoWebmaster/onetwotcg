<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Two TCG</title>
    <link rel="stylesheet" href="">
</head>

<body>

    <header>
        <nav class="template">

        </nav>
    </header>

    <main>
        <div id="product">
            <h1 id="productName"></h1>
            <div>
                <img src="" alt="" id="image">
            </div>
            <div id="productPrice"></div>
            <div id="stockCount"></div>
            <div>
                <p id="description"></p>
            </div>
        </div>
        <div>
            <div id="qtyControls">
                <button id="decBtn" type="button">-</button>
                <input type="number" id="numInput" value="1" size="2"/>
                <button id="incBtn" type="button">+</button>
                <button id="cartBtn">Add to Basket</button>
                <button id="removeBtn" type="button">Remove</button>
            </div>
            <div id="inCart"></div>
        </div>
    </main>

    <footer>
        This is where footer content will go.
    </footer>

    <script type="module" src="/assets/js/product.js"></script>
    <script type="module" src="/assets/js/app.js"></script>
    
</body>

</html>
